<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CivXpert - Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #111827; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
        .card { background: #1f2937; padding: 2rem; border-radius: 1rem; width: 380px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        h1 { color: #22d3ee; text-align: center; margin-bottom: 1.5rem; font-size: 1.5rem; }
        label { color: #9ca3af; font-size: 0.85rem; display: block; margin-bottom: 0.3rem; }
        input { width: 100%; padding: 0.6rem; border-radius: 0.5rem; background: #374151; color: white; border: 1px solid #4b5563; margin-bottom: 1rem; font-size: 1rem; }
        input:focus { outline: none; border-color: #22d3ee; }
        button { width: 100%; background: #06b6d4; color: white; font-weight: bold; padding: 0.6rem; border: none; border-radius: 0.5rem; cursor: pointer; font-size: 1rem; }
        button:hover { background: #0891b2; }
        .footer { text-align: center; margin-top: 1rem; color: #6b7280; font-size: 0.85rem; }
        .footer a { color: #22d3ee; text-decoration: none; }
        .error { color: #f87171; text-align: center; margin-bottom: 1rem; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔒 Login to CivXpert</h1>
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
        <form method="POST">
            <label>Username</label>
            <input name="username" type="text" required/>
            <label>Password</label>
            <input name="password" type="password" required/>
            <button type="submit">Login</button>
        </form>
        <p class="footer">No account? <a href="/register">Register</a></p>
    </div>
</body>
</html>
