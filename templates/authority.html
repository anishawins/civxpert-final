<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CivXpert - Authority Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-900 min-h-screen text-white p-8">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-cyan-400">🏛️ Authority Dashboard</h1>
            <a href="/logout" class="text-sm text-red-400 hover:underline">Logout</a>
        </div>

        <div class="bg-gray-800 p-6 rounded-2xl mb-8">
            <h2 class="text-xl font-semibold mb-4 text-cyan-300">📊 Complaints by Department</h2>
            <canvas id="deptChart" height="100"></canvas>
        </div>

        <div class="bg-gray-800 p-6 rounded-2xl">
            <h2 class="text-xl font-semibold mb-4 text-cyan-300">📋 All Complaints</h2>
            <table class="w-full text-sm">
                <thead>
                    <tr class="text-gray-400 border-b border-gray-700">
                        <th class="text-left py-2">User</th>
                        <th class="text-left py-2">Complaint</th>
                        <th class="text-left py-2">Department</th>
                        <th class="text-left py-2">Priority</th>
                    </tr>
                </thead>
                <tbody>
                {% for c in complaints %}
                <tr class="border-b border-gray-700">
                    <td class="py-2">{{ c.username }}</td>
                    <td class="py-2">{{ c.text[:50] }}...</td>
                    <td class="py-2">{{ c.department }}</td>
                    <td class="py-2 font-bold {% if c.priority == 'High' %}text-red-400{% elif c.priority == 'Medium' %}text-yellow-400{% else %}text-green-400{% endif %}">
                        {{ c.priority }}
                    </td>
                </tr>
                {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const labels = {{ dept_counts.keys()|list|tojson }};
        const data = {{ dept_counts.values()|list|tojson }};
        new Chart(document.getElementById('deptChart'), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Complaints',
                    data: data,
                    backgroundColor: 'rgba(6, 182, 212, 0.7)',
                    borderColor: 'rgba(6, 182, 212, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                plugins: { legend: { labels: { color: 'white' } } },
                scales: {
                    x: { ticks: { color: 'white' } },
                    y: { ticks: { color: 'white' }, beginAtZero: true }
                }
            }
        });
    </script>
</body>
</html>
