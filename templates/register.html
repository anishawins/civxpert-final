<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CivXpert - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center">
    <div class="bg-gray-800 p-8 rounded-2xl shadow-xl w-96">
        <h1 class="text-3xl font-bold text-cyan-400 text-center mb-6">📝 Register</h1>
        {% if error %}
        <p class="text-red-400 text-center mb-4">{{ error }}</p>
        {% endif %}
        <form method="POST">
            <label class="text-gray-300 text-sm">Username</label>
            <input name="username" type="text" required
                class="w-full mt-1 mb-4 p-2 rounded-lg bg-gray-700 text-white border border-gray-600 focus:outline-none focus:border-cyan-400"/>
            <label class="text-gray-300 text-sm">Password</label>
            <input name="password" type="password" required
                class="w-full mt-1 mb-6 p-2 rounded-lg bg-gray-700 text-white border border-gray-600 focus:outline-none focus:border-cyan-400"/>
            <button type="submit"
                class="w-full bg-cyan-500 hover:bg-cyan-600 text-white font-bold py-2 rounded-lg transition">
                Register
            </button>
        </form>
        <p class="text-gray-400 text-center mt-4 text-sm">
            Already have an account? <a href="/login" class="text-cyan-400 hover:underline">Login</a>
        </p>
    </div>
</body>
</html>
